name: Label schema bump

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  issues: write
  pull-requests: read

jobs:
  detect-schema-bump:
    runs-on: ubuntu-latest
    steps:
      - name: Determine changed files ad label bump if meta.version changed
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            if (!pr) {
              core.info('No pull request context found, existing.');
              return;
            }

            // list all files modified in PR
            const files = await github.paginate(github.rest.pulls.listFiles, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number
            });

            // filter only JSON files inside data/schemas/
            const schemaFiles = files
              .map(f => f.filename)
              .filter(f => f.startsWith('data/schemas/') && f.endswith('.json'));
            
            if (schemaFiles.length === 0) {
              core.info('No schema JSON files changed.');
              return;
            }

            const labelsToAdd = new Set();

            for (const path of schemaFiles) {
              core.info(`Checking ${path}`);

              // try take content from file in (target)
              async function getJsonAtRef(filePath, ref) {
                try {
                  const res = await github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path: filePath,
                    ref
                  });
                  // res.data.content is base64
                  const content = Buffer.from(res.data.content, 'base64').toString('utf8')
                  return JSON.parse(content)
                } catch (err) {
                  core.info(`Could not read ${filePath} at ref ${ref}: ${err.message}`)
                  return null;
                }
              }

              const baseRef = pr.base.sha;
              const headRef = pr.head.sha;

              const baseJson = await getJsonAtRef(path, baseRef)
              const headJson = await getJsonAtRef(path, headRef)

              const baseVersion = baseJson && baseJson.meta && baseJson.meta.version ? String(baseJson.meta.version) : null;
              const headversion = headJson && headJson.meta && headJson.meta.version ? String(headJson.meta.version) : null;

              core.info(`baseVersion=${baseVersion} headVersion=${headVersion}`);

              // If version changed
              const versionChanged = baseVersion !== headVersion;

              if (versionChanged) {
                core.info(`Version changed for ${path}`);
                labelsToAdd.add('bump')
              } else {
                core.info(`No version change for ${path}`);
              }
            }

            if (labelsToAdd.size === 0) {
              core.info('No labels to add.')
              return;
            }

            const existing = (pr.labels || []).map(l => l.name);
            const toAdd = Array.from(labelsToAdd).filter(l => !existing.includes(l));

            if (toAdd.length === 0) {
              core.info('Labels already present, nothing to add.');
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: toAdd
            });

            core.info(`Added labels: ${toAdd.join(', ')}`)